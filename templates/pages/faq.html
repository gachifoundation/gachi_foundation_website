{% extends "base.html" %}
{% block content %}
<section class="page-hero">
  <div class="container">
    <span class="eyebrow">Help</span>
    <h1>Frequently Asked Questions</h1>
  </div>
</section>
<section class="section">
  <div class="container" style="max-width:820px">
    {% for f in faqs %}
    <div class="faq-item reveal">
      <h3>{{ f.q }} <span>＋</span></h3>
      <p>{{ f.a }}</p>
    </div>
    {% endfor %}
  </div>
</section>
{% endblock %}
