{% extends "base.html" %}
{% block content %}
<section class="page-hero">
  <div class="container">
    <span class="eyebrow">Events</span>
    <h1>Calendar</h1>
    <p class="lead">Public calendar of {{ ngo.name }}.</p>
  </div>
</section>
<section class="section">
  <div class="container">
    <div class="card reveal" style="padding:0;overflow:hidden">
      <iframe
        src="https://calendar.google.com/calendar/embed?src=gachifoundation%40gmail.com&ctz=Asia%2FKolkata"
        style="border:0;width:100%;height:600px" frameborder="0" scrolling="no"
        title="Gachi Foundation public calendar"></iframe>
    </div>
    <p class="small center" style="margin-top:14px">
       Have a good day.</p>
  </div>
</section>
{% endblock %}
