{% extends "base.html" %}
{% block content %}
<section class="page-hero">
  <div class="container"><span class="eyebrow">Find Us</span><h1>Address</h1></div>
</section>
<section class="section">
  <div class="container">
    <div class="grid grid-2">
      <div class="card reveal">
        <h3>Registered Office</h3>
        <p>{{ ngo.address.line1 }}<br>{{ ngo.address.line2 }}<br>
           {{ ngo.address.city }} — {{ ngo.address.pincode }}<br>
           {{ ngo.address.state }}, {{ ngo.address.country }}</p>
        <p><strong>Email:</strong> {{ ngo.email }}</p>
      </div>
      <div class="card reveal" style="padding:0;overflow:hidden">
        <iframe title="Map"
          src="https://www.google.com/maps?q=Gopikandar,Dumka,Jharkhand&output=embed"
          style="border:0;width:100%;height:340px"></iframe>
      </div>
    </div>
  </div>
</section>
{% endblock %}
